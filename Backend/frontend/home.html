{% extends "base.html" %}
{% block title %}Home - Carol's IMS{% endblock %}

{% block content %}
<div class="home-screen">
  <div class="home-header">
    <div class="home-welcome">Welcome, {{ full_name }}</div>
    <div class="home-role">{{ role | capitalize }}</div>
  </div>

  <div class="home-grid">
    <a href="/dashboard" class="home-tile">
      <div class="home-tile-icon">&#9783;</div>
      <div class="home-tile-label">Dashboard</div>
      <span class="home-tile-arrow">&#8594;</span>
    </a>

    <a href="/inventory" class="home-tile">
      <div class="home-tile-icon">&#9636;</div>
      <div class="home-tile-label">Inventory</div>
      <span class="home-tile-arrow">&#8594;</span>
    </a>

    <a href="/sales" class="home-tile">
      <div class="home-tile-icon">&#36;</div>
      <div class="home-tile-label">Sales</div>
      <span class="home-tile-arrow">&#8594;</span>
    </a>

    <a href="/alerts" class="home-tile">
      <div class="home-tile-icon">&#9888;</div>
      <div class="home-tile-label">Alerts</div>
      <span class="home-tile-arrow">&#8594;</span>
    </a>

    <a href="/reports" class="home-tile">
      <div class="home-tile-icon">&#9741;</div>
      <div class="home-tile-label">Reports</div>
      <span class="home-tile-arrow">&#8594;</span>
    </a>

    {% if role in ['owner', 'manager'] %}
    <a href="/users" class="home-tile">
      <div class="home-tile-icon">&#9786;</div>
      <div class="home-tile-label">Users</div>
      <span class="home-tile-arrow">&#8594;</span>
    </a>
    {% endif %}
  </div>
</div>
{% endblock %}
