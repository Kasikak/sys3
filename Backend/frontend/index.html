<!DOCTYPE html>
<html>
<head>
  <title>Carol's Inventory Management System Dashboard</title>
  <style>
    .content {
        padding: 60px;
        text-align: center;
        border-style: double;
        background-color: #a682e0;
    }
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 30px;
        margin-bottom: 60px;
        margin-top: 40px;
    }
    .card {
        background: #a682e0;
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 2px 8px rgba(255, 255, 255, 0.918);
        text-align: center;
    }
    #product-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }
    #product-table th, #product-table td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: left;
    }
    #product-table th {
        background: #a682e0;
    }
    .chart-container {
        margin-top: 40px;
        width: 100%;
        max-width: 700px;}

    #product-table-container{
        text-align: center;
    }
    .button-group{
        text-align: center;
    }
  </style>
</head>

<body>

  <div id="sidebar"></div>
  <div id="topbar"></div>

  <div class="content">
      <h2>Carol's Inventory Management System Dashboard</h2>
  </div>

  <div id="product-table-container">
      <h3>Inventory</h3>

      <div class="button-group">
          <input type="text"   id="itemName"  placeholder="Item Name" />
          <input type="number" id="quantity"  placeholder="Quantity" />
          <input type="number" id="price"     placeholder="Price" step="0.01" />
          <input type="number" id="stock"     placeholder="Stock" />
          <input type="text"   id="category"  placeholder="Category" />
      </div>

      <div class="button-group">
          <button id="add-product-btn"    class="btn"       onclick="addItem()">+ Add Product</button>
          <button id="remove-product-btn" class="btn-danger" onclick="removeItem()">Remove Product</button>
          <button id="update-product-btn" class="btn"       onclick="updateItem()">Update Product</button>
      </div>

      <p id="message"></p>

      <table id="product-table">
          <thead>
              <tr>
                  <th>Item Name</th>
                  <th>Quantity</th>
                  <th>Price</th>
                  <th>Stock</th>
                  <th>Category</th>
              </tr>
          </thead>
          <tbody id="itemTableBody"></tbody>
      </table>
  </div>

  <script src="script.js"></script>

</body>
</html>
