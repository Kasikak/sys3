<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Carol's IMS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="pos-login-body">

  <div class="pos-login-wrap">

    <div class="pos-login-left">
      <div class="pos-brand">Carol's Distributors</div>
      <div class="pos-brand-sub">Inventory Management System</div>
    </div>

    <div class="pos-login-right">

      <div class="pos-user-select">
        <label class="pos-label">Select User</label>
        <input type="text" id="user-input" class="pos-select" list="user-list"
               placeholder="Type or choose a user..." autocomplete="off"
               oninput="onUserSelect()" onchange="onUserSelect()" />
        <datalist id="user-list"></datalist>
      </div>

      <div class="pos-pin-display">
        <div id="pin-dots" class="pin-dots">
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
        </div>
        <div id="pin-label" class="pin-label">Enter password</div>
      </div>

      <div id="error-msg" class="pos-error hidden"></div>

      <div class="pos-numpad">
        <button class="num-key" onclick="pressKey('1')">1</button>
        <button class="num-key" onclick="pressKey('2')">2</button>
        <button class="num-key" onclick="pressKey('3')">3</button>
        <button class="num-key" onclick="pressKey('4')">4</button>
        <button class="num-key" onclick="pressKey('5')">5</button>
        <button class="num-key" onclick="pressKey('6')">6</button>
        <button class="num-key" onclick="pressKey('7')">7</button>
        <button class="num-key" onclick="pressKey('8')">8</button>
        <button class="num-key" onclick="pressKey('9')">9</button>
        <button class="num-key num-clear" onclick="clearPin()">Clear</button>
        <button class="num-key" onclick="pressKey('0')">0</button>
        <button class="num-key num-back" onclick="backspace()">&#9003;</button>
      </div>

      <button id="login-btn" class="pos-login-btn" onclick="doLogin()">Sign In</button>

    </div>
  </div>

  <script>
    let pin = '';
    let userMap = {}; // full_name → username

    async function loadUsers() {
      try {
        const res   = await fetch('/api/users/public');
        const users = await res.json();
        const dl    = document.getElementById('user-list');
        users.forEach(u => {
          userMap[u.full_name] = u.username;
          const opt = document.createElement('option');
          opt.value = u.full_name;
          dl.appendChild(opt);
        });
      } catch (_) {}
    }

    function onUserSelect() {
      pin = '';
      updateDots();
      document.getElementById('error-msg').classList.add('hidden');
    }

    function resolveUsername() {
      const val = document.getElementById('user-input').value.trim();
      // If typed value matches a full name exactly, return mapped username
      if (userMap[val]) return userMap[val];
      // Otherwise treat as a direct username entry
      return val;
    }

    function pressKey(k) {
      if (pin.length >= 8) return;
      pin += k;
      updateDots();
    }

    function backspace() {
      pin = pin.slice(0, -1);
      updateDots();
    }

    function clearPin() {
      pin = '';
      updateDots();
    }

    function updateDots() {
      const dots = document.querySelectorAll('.pin-dot');
      dots.forEach((d, i) => d.classList.toggle('filled', i < pin.length));
    }

    async function doLogin() {
      const username = resolveUsername();
      const errEl    = document.getElementById('error-msg');
      errEl.classList.add('hidden');

      if (!username) {
        errEl.textContent = 'Please select or type a user';
        errEl.classList.remove('hidden');
        return;
      }
      if (!pin) {
        errEl.textContent = 'Please enter your password';
        errEl.classList.remove('hidden');
        return;
      }

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const res  = await fetch('/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, password: pin })
      });
      const data = await res.json();

      if (data.success) {
        window.location.href = '/home';
      } else {
        errEl.textContent = data.error || 'Invalid password';
        errEl.classList.remove('hidden');
        pin = '';
        updateDots();
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    // Allow keyboard input too
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') pressKey(e.key);
      else if (e.key === 'Backspace') backspace();
      else if (e.key === 'Enter') doLogin();
      else if (e.key === 'Escape') clearPin();
    });

    loadUsers();
  </script>
</body>
</html>
